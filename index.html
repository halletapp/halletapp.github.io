/* ─── PROCESS SELECT ─────────────────────────────────────────*/

/* ─── GUIDE ──────────────────────────────────────────────────*/
function GuideScreen({ cat, process, situation, onBack }) {
  const [steps,   setSteps]   = useState([]);
  const [loading, setLoading] = useState(true);
  const [checked, setChecked] = useState({});
  const [tab,     setTab]     = useState("steps");
  const [votes,   setVotes]   = useState({});
  const [tipForm, setTipForm] = useState(false);
  const [newTip,  setNewTip]  = useState("");

  const info  = COST[process.id] || COST.default;
  const tips  = TIPS[process.id] || [];
  const done  = Object.values(checked).filter(Boolean).length;
  const pct   = steps.length ? Math.round(done/steps.length*100) : 0;

  useEffect(() => { fetchSteps(); }, []);

  async function fetchSteps() {
    setLoading(true); setSteps([]);
    try {
      const r = await fetch("https://api.anthropic.com/v1/messages", {
        method:"POST",
        headers:{"Content-Type":"application/json"},
        body: JSON.stringify({
          model:"claude-sonnet-4-20250514",
          max_tokens:1200,
          system:`Sen Türkiye'deki bürokratik işlemler için adım adım rehber oluşturan bir asistandsın.
Kullanıcının durumuna göre kişiselleştirilmiş, net, pratik adımlar üret.
SADECE geçerli JSON döndür, başka metin ekleme.
Format:
{
  "steps": [
    {
      "id": 1,
      "title": "Adım başlığı",
      "detail": "Detaylı açıklama",
      "doc": "Gerekli belgeler (yoksa boş)",
      "tip": "Pratik ipucu (yoksa boş)",
      "link": "Tam URL (yoksa boş)"
    }
  ]
}`,
          messages:[{role:"user",content:`İşlem: ${process.label}\nKullanıcı durumu: ${situation}\n\n5–8 adım ver, sadece bu duruma özel.`}]
        })
      });
      const data = await r.json();
      const raw  = (data.content||[]).map(b=>b.text||"").join("");
      const parsed = JSON.parse(raw.replace(/```json|```/g,"").trim());
      setSteps(parsed.steps||[]);
    } catch {
      setSteps([{id:1,title:"Bağlantı hatası",detail:"Adımlar yüklenirken sorun oluştu. Sayfayı yenileyin.",doc:"",tip:"",link:""}]);
    }
    setLoading(false);
  }

  const TABS = [
    {id:"steps", label: steps.length ? `📋 Adımlar (${done}/${steps.length})` : "📋 Adımlar"},
    {id:"tips",  label:`💬 Topluluk (${tips.length})`},
    {id:"links", label:"🔗 Linkler"},
  ];

  const allLinks = [
    {icon:"🇹🇷", title:"e-Devlet Kapısı",      url:"https://www.turkiye.gov.tr"},
    ...info.links.map(l=>({icon:"🔗", title:l.l, url:l.url})),
    {icon:"📮", title:"PTT Şube Bul",           url:"https://www.ptt.gov.tr/subeler"},
    {icon:"📍", title:"Nüfus Müdürlükleri",     url:"https://www.nvi.gov.tr"},
  ];

  return (
    <div className="max-w-3xl mx-auto px-5 py-8 pb-24 fade-up">
      <button onClick={onBack} className="back-btn border border-gray-200 bg-white px-4 py-2 text-sm font-sans text-gray-500 mb-6 transition-colors">
        ← Geri
      </button>

      {/* Title */}
      <div className="mb-5 pb-5 border-b border-gray-200">
        <h2 className="font-serif font-bold text-2xl text-ink mb-2">{process.label}</h2>
        <div className="font-sans text-sm text-gray-600 bg-cream-dark px-3 py-2 border-l-4 border-gold">{situation}</div>
      </div>

      {/* Cost/Time bar */}
      <div className="info-bar flex bg-ink px-6 py-4 mb-5 gap-6 items-center">
        {[["⏱","Tahmini Süre",info.dur],["💰","Tahmini Maliyet",info.cost]].map(([icon,lbl,val],i) => (
          <React.Fragment key={lbl}>
            {i>0 && <div className="info-sep w-px self-stretch bg-gray-700" />}
            <div className="flex items-center gap-3">
              <span className="text-2xl">{icon}</span>
              <div>
                <div className="text-gray-500 font-sans text-xs tracking-widest uppercase">{lbl}</div>
                <div className="text-gold font-sans font-semibold text-sm mt-0.5">{val}</div>
              </div>
            </div>
          </React.Fragment>
        ))}
      </div>

      {/* Tabs */}
      <div className="flex border-b-2 border-gray-200 mb-5">
        {TABS.map(t => (
          <button key={t.id} onClick={() => setTab(t.id)}
            className={`px-4 py-2.5 font-sans text-sm -mb-0.5 border-b-2 transition-all
              ${tab===t.id ? "text-ink font-bold border-gold":"text-gray-400 border-transparent hover:text-gray-600"}`}>
            {t.label}
          </button>
        ))}
      </div>

      {/* ── STEPS ── */}
      {tab==="steps" && (
        <div className="flex flex-col gap-3">
          {loading ? (
            <div className="flex flex-col items-center py-16 gap-4">
              <div className="spin w-10 h-10 rounded-full border-4 border-gray-200 border-t-gold" />
              <div className="font-sans text-sm text-gray-500">Durumunuza özel adımlar hazırlanıyor…</div>
            </div>
          ) : (
            <>
              {steps.length>0 && (
                <div className="relative h-2 bg-gray-200 mb-3">
                  <div className="progress-fill h-full bg-gold absolute top-0 left-0" style={{width:`${pct}%`}} />
                  <span className="absolute -top-5 right-0 font-sans text-xs text-gray-400">{pct}% tamamlandı</span>
                </div>
              )}
              {steps.map((step,i) => (
                <div key={step.id}
                  className={`step-card border p-5 ${checked[step.id]?"bg-green-50 border-green-200 opacity-70":"bg-white border-gray-200"}`}>
                  <div className="flex gap-4 items-start">
                    <button
                      onClick={() => setChecked(p=>({...p,[step.id]:!p[step.id]}))}
                      className={`step-circle w-9 h-9 flex-shrink-0 flex items-center justify-center border-2 font-sans font-bold text-sm
                        ${checked[step.id]?"bg-green-600 border-green-600 text-white":"border-gray-300 text-gray-500 hover:border-gold"}`}>
                      {checked[step.id]?"✓":i+1}
                    </button>
                    <div className="flex-1 min-w-0">
                      <div className="font-sans font-bold text-base text-ink mb-1.5">{step.title}</div>
                      <div className="font-sans text-sm text-gray-600 leading-relaxed mb-2">{step.detail}</div>
                      {step.doc && (
                        <div className="bg-cream-dark px-3 py-2 font-sans text-xs text-gray-600 mb-2 leading-relaxed">
                          📄 <strong>Belgeler:</strong> {step.doc}
                        </div>
                      )}
                      {step.tip && (
                        <div className="bg-yellow-50 border border-yellow-200 px-3 py-2 font-sans text-xs text-yellow-800 mb-2 flex gap-2 leading-relaxed">
                          <span>💡</span><span>{step.tip}</span>
                        </div>
                      )}
                      {step.link && (
                        <a href={step.link} target="_blank" rel="noopener noreferrer"
                          className="inline-flex items-center gap-1 font-sans text-xs font-semibold text-blue-700 bg-blue-50 border border-blue-200 px-3 py-1.5 hover:bg-blue-100 transition-colors no-underline">
                          🔗 Doğrudan Başvur →
                        </a>
                      )}
                    </div>
                  </div>
                </div>
              ))}
            </>
          )}
        </div>
      )}

      {/* ── TIPS ── */}
      {tab==="tips" && (
        <div className="flex flex-col gap-3">
          <div className="flex items-center justify-between mb-2">
            <span className="font-sans font-bold text-sm text-ink">Topluluktan Deneyimler</span>
            <button onClick={() => setTipForm(p=>!p)}
              className="bg-ink text-gold font-sans text-xs font-bold px-3 py-1.5">
              + Deneyim Ekle
            </button>
          </div>

          {tipForm && (
            <div className="bg-white border border-dashed border-gold p-4 mb-2 fade-up">
              <textarea
                className="w-full p-3 border border-gray-200 font-sans text-sm leading-relaxed bg-gray-50 resize-none mb-3"
                placeholder="Bu işlemi yaptıysanız başkalarına faydalı bir ipucu paylaşın…"
                value={newTip} onChange={e=>setNewTip(e.target.value)} rows={3} />
              <button onClick={()=>{setNewTip("");setTipForm(false);}}
                className="cta-btn bg-ink text-gold font-serif font-bold px-5 py-2.5 text-sm">
                Gönder
              </button>
            </div>
          )}

          {tips.length===0 && (
            <div className="text-center py-12 font-sans text-sm text-gray-400 bg-white border border-dashed border-gray-200">
              Bu işlem için henüz deneyim yok. İlk paylaşan sen ol!
            </div>
          )}

          {tips.map((t,i)=>(
            <div key={i} className="bg-white border border-gray-200 p-4">
              <div className="flex items-center gap-2.5 mb-3">
                <div className="w-8 h-8 bg-ink flex items-center justify-center font-serif font-bold text-gold text-sm flex-shrink-0">
                  {t.user[0]}
                </div>
                <div>
                  <span className="font-sans font-bold text-sm text-ink">{t.user}</span>
                  <span className="font-sans text-xs text-gray-400"> · {t.loc} · {t.time}</span>
                </div>
              </div>
              <p className="font-sans text-sm text-gray-700 leading-relaxed mb-3">{t.tip}</p>
              <button onClick={()=>setVotes(p=>({...p,[i]:(p[i]||0)+1}))}
                className="vote-btn border border-gray-200 px-3 py-1.5 font-sans text-xs text-gray-500 transition-colors">
                👍 {t.votes+(votes[i]||0)} faydalı buldu
              </button>
            </div>
          ))}
        </div>
      )}

      {/* ── LINKS ── */}
      {tab==="links" && (
        <div>
          <p className="text-xs font-sans font-bold tracking-widest text-gold uppercase mb-4">Doğrudan Bağlantılar</p>
          <div className="flex flex-col gap-2 mb-5">
            {allLinks.map((l,i)=>(
              <a key={i} href={l.url} target="_blank" rel="noopener noreferrer"
                className="link-card flex items-center gap-4 p-4 bg-white border border-gray-200 no-underline">
                <span className="text-2xl flex-shrink-0">{l.icon}</span>
                <div className="flex-1 min-w-0">
                  <div className="font-sans font-semibold text-sm text-ink">{l.title}</div>
                  <div className="font-sans text-xs text-gray-400 truncate">{l.url.replace("https://","")}</div>
                </div>
                <span className="text-gold font-bold flex-shrink-0">→</span>
              </a>
            ))}
          </div>
          <div className="font-sans text-xs text-gray-500 bg-cream-dark px-4 py-3 border-l-4 border-gold leading-relaxed">
            💡 Tüm linkler resmi kurum sitelerine yönlendirir. Güncel bilgi için ilgili kurumu teyit edin.
          </div>
        </div>
      )}
    </div>
  );
}

/* ─── APP ────────────────────────────────────────────────────*/
function App() {
  const [screen,    setScreen]    = useState("home");
  const [cat,       setCat]       = useState(null);
  const [process,   setProcess]   = useState(null);
  const [situation, setSituation] = useState("");

  function reset() {
    setScreen("home"); setCat(null); setProcess(null); setSituation("");
    window.scrollTo({top:0,behavior:"smooth"});
  }

  function selectCat(c) {
    setCat(c); setScreen("process");
    window.scrollTo({top:0,behavior:"smooth"});
  }

  function start(p,s) {
    setProcess(p); setSituation(s); setScreen("guide");
    window.scrollTo({top:0,behavior:"smooth"});
  }

  return (
    <div className="min-h-screen bg-cream">
      <Header onReset={reset} />

      {screen==="home"    && <HomeScreen onSelect={selectCat} />}
      {screen==="process" && cat && <ProcessScreen cat={cat} onBack={()=>setScreen("home")} onStart={start} />}
      {screen==="guide"   && process && <GuideScreen cat={cat} process={process} situation={situation} onBack={()=>setScreen("process")} />}

      <footer className="bg-ink py-6 px-4 text-center">
        <div className="font-sans text-sm text-gray-500 mb-1">Hallet · Türkiye Bürokrasi Rehberi</div>
        <div className="font-sans text-xs text-gray-600">Bu site resmi bir devlet sitesi değildir. Güncel bilgi için ilgili kurumları teyit edin.</div>
      </footer>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App />);
</script>
</body>
</html>
